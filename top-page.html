<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ドリーミング Dance Tools">
<title>ドリーミング アイドルダンススクール — Dance Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Quicksand:wght@400;500;600;700&display=swap');

  :root {
    --pink-50:#fff0f5; --pink-100:#ffe4ef; --pink-200:#ffc8df;
    --pink-300:#ffa0c8; --pink-400:#ff78b0; --pink-500:#f75d97; --pink-600:#e8458a; --pink-700:#d42d78;
    --gold:#d4a843; --gold-light:#f0d68a; --gold-glow:rgba(212,168,67,0.15);
    --bg:#fff5f9; --sf:#ffffff; --text:#5a2d42; --dim:#b07a95;
    --bd:rgba(247,93,151,0.12); --sh:rgba(247,93,151,0.12);
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    font-family:'Zen Maru Gothic','Quicksand',-apple-system,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; min-height:-webkit-fill-available;
    overflow-x:hidden; -webkit-text-size-adjust:100%;
  }

  /* Dreamy background */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(255,160,200,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 25%, rgba(240,214,138,0.12) 0%, transparent 40%),
      radial-gradient(ellipse at 40% 85%, rgba(255,200,223,0.18) 0%, transparent 50%);
  }

  .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 16px; padding-top:calc(var(--sat) + 20px); padding-bottom:calc(var(--sab) + 30px); }

  /* Sparkle decorations */
  .sparkle { position:fixed; color:var(--gold-light); pointer-events:none; z-index:0; animation:sp 4s ease-in-out infinite; }
  @keyframes sp { 0%,100%{opacity:.25;transform:scale(1) rotate(0deg)} 50%{opacity:1;transform:scale(1.3) rotate(180deg)} }

  /* Logo area */
  .logo-area {
    display:flex; flex-direction:column; align-items:center;
    margin-top:20px; margin-bottom:8px;
    animation:fadeUp .8s ease-out both;
  }

  @keyframes fadeUp {
    0% { opacity:0; transform:translateY(20px); }
    100% { opacity:1; transform:translateY(0); }
  }

  .logo-img {
    width:120px; height:120px; object-fit:contain;
    filter:drop-shadow(0 4px 20px rgba(247,93,151,0.15));
    animation:logoFloat 4s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-6px); }
  }

  .brand-name {
    font-size:28px; font-weight:900; color:var(--pink-600);
    margin-top:8px; letter-spacing:1px;
  }

  .brand-sub {
    font-size:12px; color:var(--gold); font-weight:700;
    letter-spacing:3px; margin-top:2px;
  }

  .catchphrase {
    margin-top:12px; padding:8px 20px;
    background:linear-gradient(135deg, rgba(255,224,239,0.6), rgba(240,214,138,0.2));
    border-radius:20px; font-size:13px; font-weight:700;
    color:var(--pink-600); letter-spacing:.5px;
    border:1px solid rgba(247,93,151,0.1);
    animation:fadeUp .8s ease-out .2s both;
  }

  .catchphrase .star { color:var(--gold); }

  /* Section title */
  .section-title {
    font-size:11px; font-weight:700; color:var(--dim);
    letter-spacing:2px; text-transform:uppercase;
    margin-top:28px; margin-bottom:14px;
    animation:fadeUp .8s ease-out .4s both;
  }

  /* Tool cards */
  .cards { display:flex; flex-direction:column; gap:12px; width:100%; max-width:400px; }

  .card {
    display:block; text-decoration:none; color:inherit;
    background:var(--sf); border-radius:20px;
    padding:20px; position:relative; overflow:hidden;
    border:1.5px solid var(--bd);
    box-shadow:0 6px 25px var(--sh), 0 2px 6px rgba(0,0,0,0.03);
    transition:all .3s cubic-bezier(.4,0,.2,1);
    animation:fadeUp .8s ease-out both;
  }

  .card:nth-child(1) { animation-delay:.5s; }
  .card:nth-child(2) { animation-delay:.65s; }

  .card:active { transform:scale(.97); box-shadow:0 3px 15px var(--sh); }

  /* Card shimmer */
  .card::before {
    content:''; position:absolute; top:-50%;left:-50%;width:200%;height:200%;
    background:linear-gradient(45deg,transparent 42%,rgba(255,255,255,0.4) 50%,transparent 58%);
    opacity:0; transition:opacity .3s;
    animation:cardShimmer 6s ease-in-out infinite;
  }

  @keyframes cardShimmer {
    0%,100% { transform:translateX(-100%) rotate(45deg); opacity:0; }
    50% { transform:translateX(100%) rotate(45deg); opacity:1; }
  }

  .card-badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:4px 10px; border-radius:12px;
    font-size:10px; font-weight:700; letter-spacing:.5px;
    margin-bottom:10px;
  }

  .card-badge.analyze { background:var(--pink-50); color:var(--pink-600); border:1px solid var(--pink-200); }
  .card-badge.compare { background:rgba(91,159,212,0.08); color:rgb(71,139,192); border:1px solid rgba(91,159,212,0.2); }

  .card-icon {
    font-size:42px; margin-bottom:10px;
    display:block;
  }

  .card-title {
    font-size:18px; font-weight:900; color:var(--text);
    margin-bottom:6px; line-height:1.3;
  }

  .card-desc {
    font-size:13px; color:var(--dim); line-height:1.6;
    margin-bottom:12px;
  }

  .card-features {
    display:flex; flex-wrap:wrap; gap:6px;
  }

  .card-tag {
    padding:4px 10px; border-radius:10px;
    font-size:10px; font-weight:700;
    background:var(--pink-50); color:var(--pink-500);
    border:1px solid rgba(247,93,151,0.1);
  }

  .card-arrow {
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    font-size:20px; color:var(--pink-300);
    transition:transform .3s;
  }

  .card:active .card-arrow { transform:translateY(-50%) translateX(4px); }

  /* Compare card accent */
  .card.compare-card {
    background:linear-gradient(135deg, var(--sf), rgba(91,159,212,0.03));
  }
  .card.compare-card .card-tag {
    background:rgba(91,159,212,0.06); color:rgb(71,139,192);
    border-color:rgba(91,159,212,0.15);
  }

  /* Footer */
  .footer {
    margin-top:32px; text-align:center;
    animation:fadeUp .8s ease-out .8s both;
  }

  .footer-logo {
    font-size:11px; font-weight:700; color:var(--dim);
    letter-spacing:1px;
  }

  .footer-copy {
    font-size:10px; color:rgba(176,122,149,0.5);
    margin-top:4px;
  }

  .footer-ribbon {
    display:inline-block; margin-top:8px;
    font-size:18px; opacity:0.4;
  }

  /* Powered by */
  .powered {
    margin-top:16px; padding:8px 14px;
    background:rgba(255,255,255,0.5); border-radius:12px;
    font-size:10px; color:var(--dim); font-weight:600;
    border:1px solid var(--bd);
    animation:fadeUp .8s ease-out .9s both;
  }

  /* Desktop */
  @media (min-width:768px) {
    .cards { flex-direction:row; max-width:700px; }
    .card { flex:1; }
    .card-arrow { display:none; }
    .logo-img { width:140px; height:140px; }
    .brand-name { font-size:32px; }
  }
</style>
</head>
