<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dance Analyzer">
<title>Dance Analyzer — ドリーミング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface-2: #1a1a25;
    --accent: #ff6b9d;
    --accent-2: #c084fc;
    --accent-3: #38bdf8;
    --text: #e8e8ef;
    --text-dim: #8888a0;
    --border: rgba(255,255,255,0.06);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Zen Maru Gothic', 'Outfit', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,107,157,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(192,132,252,0.1) 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
  }

  .app { position: relative; z-index: 1; }

  /* ── Header ── */
  .header {
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(10,10,15,0.85);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }

  .status-badge {
    padding: 5px 10px;
    border-radius: 16px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .status-badge.ready { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
  .status-badge.loading { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .status-badge.analyzing { background: rgba(255,107,157,0.1); color: var(--accent); border: 1px solid rgba(255,107,157,0.2); animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── Mobile Layout: stacked ── */
  .main {
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 60px);
  }

  /* ── Video area ── */
  .video-area { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .video-container {
    position: relative;
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
    width: 100%;
  }

  .video-container video,
  .video-container canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
  }

  #overlayCanvas { z-index: 2; pointer-events: none; }

  .upload-zone {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    z-index: 3;
  }

  .upload-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,107,157,0.1), rgba(192,132,252,0.1));
    border: 2px dashed rgba(255,107,157,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .upload-title { font-size: 16px; font-weight: 700; }
  .upload-hint { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.5; }

  .upload-btn {
    margin-top: 4px;
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; flex: 1; justify-content: center; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-camera { background: linear-gradient(135deg, var(--accent-3), #818cf8); color: white; }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }

  .speed-control select {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    -webkit-appearance: none;
  }

  /* Timeline */
  .timeline-bar {
    width: 100%;
    height: 8px;
    background: var(--surface-2);
    border-radius: 4px;
    position: relative;
    touch-action: none;
  }

  .timeline-progress {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px;
    position: relative;
  }

  .timeline-progress::after {
    content: '';
    position: absolute;
    right: -7px; top: -3px;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,107,157,0.5);
  }

  /* ── Tab Panel (mobile) ── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 56px;
    z-index: 50;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-item {
    flex: 1;
    min-width: fit-content;
    padding: 12px 16px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab-item.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-content { display: none; padding: 16px 12px; }
  .tab-content.active { display: block; }

  /* ── Angle cards ── */
  .angle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .angle-card {
    background: var(--surface-2);
    border-radius: 12px;
    padding: 12px;
    border: 1px solid var(--border);
  }

  .angle-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .angle-label { font-size: 12px; font-weight: 600; }
  .angle-value {
    font-family: 'Outfit', monospace;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .angle-bar-bg { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .angle-bar-fill { height: 100%; border-radius: 2px; transition: width 0.15s ease; }

  /* ── Balance ── */
  .balance-display { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 10px 0; }

  .balance-visual {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 2px solid var(--border);
    position: relative;
    background: radial-gradient(circle, rgba(255,107,157,0.05), transparent);
  }

  .balance-dot {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px rgba(255,107,157,0.5);
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
  }

  .balance-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; }
  .balance-crosshair::before, .balance-crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.05); }
  .balance-crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  .balance-crosshair::after { width: 100%; height: 1px; top: 50%; left: 0; }

  .balance-labels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
  .balance-label { text-align: center; font-size: 11px; color: var(--text-dim); }
  .balance-label span { display: block; font-size: 18px; font-weight: 700; color: var(--text); margin-top: 2px; }

  /* ── Tips ── */
  .tip-card {
    background: var(--surface-2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid;
    font-size: 13px;
    line-height: 1.6;
  }

  .tip-card.good { border-color: #34d399; }
  .tip-card.warn { border-color: #fbbf24; }
  .tip-card.fix { border-color: #f87171; }

  .tip-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .tip-card.good .tip-label { color: #34d399; }
  .tip-card.warn .tip-label { color: #fbbf24; }
  .tip-card.fix .tip-label { color: #f87171; }

  /* ── Empty state ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; text-align: center; color: var(--text-dim); gap: 8px; }
  .empty-state .empty-icon { font-size: 36px; opacity: 0.5; }
  .empty-state p { font-size: 13px; line-height: 1.5; }

  /* ── Mode selector ── */
  .mode-selector {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .mode-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active {
    border-color: var(--accent);
    background: rgba(255,107,157,0.05);
  }

  .mode-btn .mode-icon { font-size: 22px; }
  .mode-btn .mode-label { font-size: 11px; color: var(--text-dim); }

  /* ── Desktop: side-by-side ── */
  @media (min-width: 768px) {
    .main { flex-direction: row; }
    .video-area { flex: 1; }
    .panel-wrapper { width: 360px; border-left: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 60px); }
    .tab-bar { position: static; }
    .mode-selector { border-bottom: none; border-right: none; }
  }

  #fileInput, #cameraInput { display: none; }

  .bottom-safe { height: var(--safe-bottom); }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">💃</div>
      <div>
        <div class="logo-text">Dance Analyzer</div>
        <div class="logo-sub">ドリーミング</div>
      </div>
    </div>
    <div class="status-badge loading" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">読み込み中...</span>
    </div>
  </div>

  <!-- Mode selector -->
  <div class="mode-selector">
    <button class="mode-btn active" id="modeVideo" onclick="setMode('video')">
      <span class="mode-icon">📁</span>
      動画ファイル
      <span class="mode-label">撮影済みの動画</span>
    </button>
    <button class="mode-btn" id="modeCamera" onclick="setMode('camera')">
      <span class="mode-icon">📸</span>
      リアルタイム
      <span class="mode-label">カメラで撮影</span>
    </button>
  </div>

  <div class="main">
    <!-- Video area -->
    <div class="video-area">
      <div class="video-container" id="videoContainer">
        <video id="videoEl" playsinline webkit-playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">📹</div>
          <div class="upload-title">ダンス動画をアップロード</div>
          <div class="upload-hint">タップして動画を選択<br>MP4 / MOV / WebM</div>
          <button class="upload-btn" onclick="document.getElementById('fileInput').click()">動画を選択</button>
        </div>
      </div>

      <input type="file" id="fileInput" accept="video/*">
      <input type="file" id="cameraInput" accept="video/*" capture="environment">

      <!-- Controls -->
      <div class="controls" id="videoControls" style="display:none;">
        <button class="btn btn-primary" id="btnAnalyze" onclick="toggleAnalysis()">▶ 分析開始</button>
        <button class="btn btn-secondary" id="btnReset" onclick="resetAll()">↺</button>
        <div class="speed-control">
          <label>速度</label>
          <select id="speedSelect" onchange="videoEl.playbackRate=parseFloat(this.value)">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
          </select>
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline-bar" id="timeline" style="display:none;">
        <div class="timeline-progress" id="timelineProgress" style="width:0%"></div>
      </div>

      <!-- Camera controls -->
      <div class="controls" id="cameraControls" style="display:none;">
        <button class="btn btn-camera" id="btnCamera" onclick="toggleCamera()">📸 カメラ起動</button>
        <button class="btn btn-secondary" onclick="setMode('video')">↺ 動画モードへ</button>
      </div>
    </div>

    <!-- Panel wrapper -->
    <div class="panel-wrapper">
      <div class="tab-bar">
        <div class="tab-item active" data-tab="angles" onclick="switchTab('angles')">🦴 関節角度</div>
        <div class="tab-item" data-tab="balance" onclick="switchTab('balance')">⚖️ バランス</div>
        <div class="tab-item" data-tab="tips" onclick="switchTab('tips')">💡 アドバイス</div>
      </div>

      <!-- Angles tab -->
      <div class="tab-content active" id="tab-angles">
        <div class="angle-grid" id="angleCards">
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-icon">📐</div>
            <p>動画を再生すると<br>関節角度がリアルタイム表示されます</p>
          </div>
        </div>
      </div>

      <!-- Balance tab -->
      <div class="tab-content" id="tab-balance">
        <div class="balance-display">
          <div class="balance-visual">
            <div class="balance-crosshair"></div>
            <div class="balance-dot" id="balanceDot" style="top:50%;left:50%;"></div>
          </div>
          <div class="balance-labels">
            <div class="balance-label">左右差<span id="lrBalance">--</span></div>
            <div class="balance-label">肩の傾き<span id="fbBalance">--</span></div>
          </div>
        </div>
      </div>

      <!-- Tips tab -->
      <div class="tab-content" id="tab-tips">
        <div id="tipsContainer">
          <div class="empty-state">
            <div class="empty-icon">✨</div>
            <p>分析が始まると<br>改善ポイントが表示されます</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-safe"></div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ── State ──
let pose = null;
let isAnalyzing = false;
let animFrameId = null;
let cameraStream = null;
let currentMode = 'video'; // 'video' | 'camera'

const videoEl = document.getElementById('videoEl');
const canvas = document.getElementById('overlayCanvas');
const ctx = canvas.getContext('2d');

// ── Joint definitions ──
const JOINTS = [
  { id: 'l_shoulder', label: '左肩', icon: '🔵', points: [13,11,23], min:0, max:180 },
  { id: 'r_shoulder', label: '右肩', icon: '🔴', points: [14,12,24], min:0, max:180 },
  { id: 'l_elbow', label: '左ひじ', icon: '🔵', points: [11,13,15], min:30, max:180 },
  { id: 'r_elbow', label: '右ひじ', icon: '🔴', points: [12,14,16], min:30, max:180 },
  { id: 'l_hip', label: '左腰', icon: '🔵', points: [11,23,25], min:60, max:180 },
  { id: 'r_hip', label: '右腰', icon: '🔴', points: [12,24,26], min:60, max:180 },
  { id: 'l_knee', label: '左ひざ', icon: '🔵', points: [23,25,27], min:30, max:180 },
  { id: 'r_knee', label: '右ひざ', icon: '🔴', points: [24,26,28], min:30, max:180 },
];

// ── Init MediaPipe ──
function initPose() {
  pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
  });
  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  pose.onResults(onPoseResults);
  pose.initialize().then(() => {
    updateStatus('ready', '準備完了');
  }).catch(err => {
    updateStatus('loading', '読み込みエラー');
    console.error(err);
  });
}

function updateStatus(state, text) {
  document.getElementById('statusBadge').className = 'status-badge ' + state;
  document.getElementById('statusText').textContent = text;
}

// ── Mode switching ──
function setMode(mode) {
  currentMode = mode;
  stopAnalysis();
  stopCamera();

  document.getElementById('modeVideo').classList.toggle('active', mode === 'video');
  document.getElementById('modeCamera').classList.toggle('active', mode === 'camera');

  if (mode === 'video') {
    document.getElementById('uploadZone').style.display = 'flex';
    document.getElementById('videoControls').style.display = 'none';
    document.getElementById('cameraControls').style.display = 'none';
    document.getElementById('timeline').style.display = 'none';
    videoEl.srcObject = null;
    videoEl.src = '';
    videoEl.muted = true;
  } else {
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('videoControls').style.display = 'none';
    document.getElementById('cameraControls').style.display = 'flex';
    document.getElementById('timeline').style.display = 'none';
  }
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ── File handling ──
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadVideo(file);
});

function loadVideo(file) {
  const url = URL.createObjectURL(file);
  videoEl.srcObject = null;
  videoEl.src = url;
  videoEl.muted = false;
  videoEl.load();
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('videoControls').style.display = 'flex';
  document.getElementById('timeline').style.display = 'block';

  videoEl.addEventListener('loadedmetadata', () => {
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
  }, { once: true });

  videoEl.addEventListener('timeupdate', () => {
    if (videoEl.duration) {
      document.getElementById('timelineProgress').style.width =
        (videoEl.currentTime / videoEl.duration * 100) + '%';
    }
  });
}

// ── Camera ──
async function toggleCamera() {
  if (cameraStream) {
    stopCamera();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    cameraStream = stream;
    videoEl.srcObject = stream;
    videoEl.muted = true;
    videoEl.play();

    videoEl.addEventListener('loadedmetadata', () => {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
    }, { once: true });

    document.getElementById('btnCamera').innerHTML = '⏹ カメラ停止';
    document.getElementById('videoControls').style.display = 'flex';
    document.getElementById('btnAnalyze').innerHTML = '▶ 分析開始';
    buildAngleCards();
    updateStatus('ready', 'カメラ起動中');

    // Auto-start analysis
    startAnalysis();
  } catch (err) {
    alert('カメラへのアクセスが許可されていません。設定からカメラの権限を許可してください。');
    console.error(err);
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  videoEl.srcObject = null;
  document.getElementById('btnCamera').innerHTML = '📸 カメラ起動';
}

// ── Analysis ──
function toggleAnalysis() {
  if (!isAnalyzing) startAnalysis();
  else stopAnalysis();
}

function startAnalysis() {
  isAnalyzing = true;
  if (currentMode === 'video') {
    videoEl.muted = true; // iOS requires muted for autoplay
    videoEl.play();
  }
  document.getElementById('btnAnalyze').innerHTML = '⏸ 一時停止';
  updateStatus('analyzing', '分析中...');
  buildAngleCards();
  analyzeFrame();
}

function stopAnalysis() {
  isAnalyzing = false;
  if (currentMode === 'video') videoEl.pause();
  document.getElementById('btnAnalyze').innerHTML = '▶ 分析再開';
  updateStatus('ready', '一時停止');
  if (animFrameId) cancelAnimationFrame(animFrameId);
}

async function analyzeFrame() {
  if (!isAnalyzing) return;
  if (currentMode === 'video' && (videoEl.paused || videoEl.ended)) {
    stopAnalysis();
    return;
  }
  try {
    await pose.send({ image: videoEl });
  } catch (e) { /* frame skip */ }
  animFrameId = requestAnimationFrame(analyzeFrame);
}

// ── Pose results ──
function onPoseResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!results.poseLandmarks) return;
  drawSkeleton(results.poseLandmarks);
  updateAngleCards(results.poseLandmarks);
  updateBalance(results.poseLandmarks);
  updateTips(results.poseLandmarks);
}

function drawSkeleton(lm) {
  const w = canvas.width, h = canvas.height;
  const connections = [
    [11,13],[13,15],[12,14],[14,16],
    [11,12],[11,23],[12,24],[23,24],
    [23,25],[25,27],[24,26],[26,28],
    [27,29],[27,31],[28,30],[28,32],
  ];

  ctx.lineWidth = Math.max(2, w * 0.004);
  connections.forEach(([a, b]) => {
    if (lm[a].visibility < 0.4 || lm[b].visibility < 0.4) return;
    const grad = ctx.createLinearGradient(lm[a].x*w, lm[a].y*h, lm[b].x*w, lm[b].y*h);
    grad.addColorStop(0, 'rgba(255,107,157,0.8)');
    grad.addColorStop(1, 'rgba(192,132,252,0.8)');
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(lm[a].x*w, lm[a].y*h);
    ctx.lineTo(lm[b].x*w, lm[b].y*h);
    ctx.stroke();
  });

  const r = Math.max(3, w * 0.006);
  lm.forEach((p, i) => {
    if (p.visibility < 0.4 || i > 32) return;
    ctx.fillStyle = i%2===0 ? 'rgba(56,189,248,0.9)' : 'rgba(255,107,157,0.9)';
    ctx.beginPath();
    ctx.arc(p.x*w, p.y*h, r, 0, 2*Math.PI);
    ctx.fill();
  });
}

// ── Angle calc ──
function calcAngle(lm, a, b, c) {
  if (lm[a].visibility<0.4||lm[b].visibility<0.4||lm[c].visibility<0.4) return null;
  const rad = Math.atan2(lm[c].y-lm[b].y, lm[c].x-lm[b].x) - Math.atan2(lm[a].y-lm[b].y, lm[a].x-lm[b].x);
  let deg = Math.abs(rad * 180 / Math.PI);
  if (deg > 180) deg = 360 - deg;
  return Math.round(deg);
}

function buildAngleCards() {
  document.getElementById('angleCards').innerHTML = JOINTS.map(j => `
    <div class="angle-card">
      <div class="angle-header">
        <span class="angle-label">${j.icon} ${j.label}</span>
        <span class="angle-value" id="val-${j.id}">--°</span>
      </div>
      <div class="angle-bar-bg">
        <div class="angle-bar-fill" id="bar-${j.id}" style="width:0%;background:var(--accent)"></div>
      </div>
    </div>
  `).join('');
}

function updateAngleCards(lm) {
  JOINTS.forEach(j => {
    const angle = calcAngle(lm, j.points[0], j.points[1], j.points[2]);
    const v = document.getElementById(`val-${j.id}`);
    const b = document.getElementById(`bar-${j.id}`);
    if (!v) return;
    if (angle === null) { v.textContent = '--°'; b.style.width = '0%'; return; }
    v.textContent = angle + '°';
    const pct = Math.min(100, Math.max(0, (angle - j.min) / (j.max - j.min) * 100));
    b.style.width = pct + '%';
    b.style.background = pct<20||pct>90 ? '#f87171' : pct<35||pct>75 ? '#fbbf24' : 'linear-gradient(90deg,var(--accent),var(--accent-2))';
  });
}

function updateBalance(lm) {
  const ls=lm[11],rs=lm[12],lh=lm[23],rh=lm[24];
  if ([ls,rs,lh,rh].some(l=>l.visibility<0.4)) return;
  const sMidX=(ls.x+rs.x)/2, hMidX=(lh.x+rh.x)/2;
  const lr=((sMidX-hMidX)*200).toFixed(1);
  const tilt=((rs.y-ls.y)*200).toFixed(1);
  document.getElementById('lrBalance').textContent = lr+'°';
  document.getElementById('fbBalance').textContent = tilt+'°';
  const dot=document.getElementById('balanceDot');
  dot.style.left = Math.max(10,Math.min(90, 50+parseFloat(lr)*2))+'%';
  dot.style.top = Math.max(10,Math.min(90, 50+parseFloat(tilt)*2))+'%';
}

let tipCounter = 0;
function updateTips(lm) {
  if (++tipCounter % 15 !== 0) return;
  const tips = [];

  const lsA = calcAngle(lm,13,11,23), rsA = calcAngle(lm,14,12,24);
  if (lsA && rsA) {
    const d = Math.abs(lsA - rsA);
    if (d<10) tips.push({type:'good', text:'肩の左右対称性◎ バランスが取れています！'});
    else if (d<25) tips.push({type:'warn', text:`肩の左右差が${d}°。鏡で確認してみましょう。`});
    else tips.push({type:'fix', text:`肩の左右差が${d}°と大きめ。片側に力が偏っているかも。`});
  }

  if (lm[23].visibility>0.4 && lm[24].visibility>0.4) {
    const ht = Math.abs(lm[23].y-lm[24].y)*100;
    if (ht>5) tips.push({type:'warn', text:'腰が傾いています。体幹を意識して水平に！'});
    else tips.push({type:'good', text:'腰の軸が安定しています！'});
  }

  const lk = calcAngle(lm,23,25,27), rk = calcAngle(lm,24,26,28);
  if (lk && rk) {
    const avg = (lk+rk)/2;
    if (avg<100) tips.push({type:'good', text:'膝がしっかり曲がってダイナミック！'});
    else if (avg>165) tips.push({type:'fix', text:'膝が伸びすぎ。少し曲げてリズムに乗ろう！'});
  }

  const container = document.getElementById('tipsContainer');
  if (!tips.length) { container.innerHTML = '<div class="empty-state"><p>データ収集中...</p></div>'; return; }
  container.innerHTML = tips.map(t => `
    <div class="tip-card ${t.type}">
      <div class="tip-label">${t.type==='good'?'✓ GOOD':t.type==='warn'?'⚠ 注意':'✗ 要改善'}</div>
      ${t.text}
    </div>
  `).join('');
}

// ── Timeline touch ──
document.getElementById('timeline').addEventListener('click', (e) => {
  if (!videoEl.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  videoEl.currentTime = ((e.clientX - rect.left) / rect.width) * videoEl.duration;
});

// Touch drag on timeline
let dragging = false;
const tl = document.getElementById('timeline');
tl.addEventListener('touchstart', (e) => { dragging = true; seekTouch(e); }, { passive: true });
tl.addEventListener('touchmove', (e) => { if (dragging) seekTouch(e); }, { passive: true });
tl.addEventListener('touchend', () => { dragging = false; });

function seekTouch(e) {
  if (!videoEl.duration) return;
  const rect = tl.getBoundingClientRect();
  const x = e.touches[0].clientX;
  const pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
  videoEl.currentTime = pct * videoEl.duration;
}

// ── Reset ──
function resetAll() {
  stopAnalysis();
  stopCamera();
  videoEl.src = '';
  videoEl.srcObject = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  setMode('video');
  document.getElementById('angleCards').innerHTML = `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📐</div><p>動画を再生すると<br>関節角度がリアルタイム表示されます</p>
    </div>`;
  document.getElementById('tipsContainer').innerHTML = `
    <div class="empty-state"><div class="empty-icon">✨</div><p>分析が始まると<br>改善ポイントが表示されます</p></div>`;
  document.getElementById('balanceDot').style.cssText = 'top:50%;left:50%';
  document.getElementById('lrBalance').textContent = '--';
  document.getElementById('fbBalance').textContent = '--';
  document.getElementById('timelineProgress').style.width = '0%';
}

// ── Init ──
initPose();
</script>
</body>
